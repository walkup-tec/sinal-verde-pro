# Heal Sinal Verde após push/redeploy Easypanel — ISOLADO.
# v8: NÃO chama restore-easypanel-traefik-backends (patchava main.yaml e derrubava Traefik/WABA).
# Só: publish :30310 + sinal-verde.yaml + strip seguro de chaves SV no main + path watch.
#
# Secrets (GitHub → Settings → Secrets → Actions):
#   VPS_SSH_PRIVATE_KEY  — obrigatório
#   VPS_HOST             — opcional; default 72.60.51.127
#
# Script canônico: walkup-tec/waba → scripts/heal-sinal-verde-pos-redeploy-vps.sh

name: Heal Sinal Verde (pós-deploy)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [easypanel-sinal-verde-redeployed, heal-sinal-verde]

concurrency:
  group: heal-sinal-verde
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validar secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::VPS_SSH_PRIVATE_KEY ausente no repo sinal-verde-pro."
            exit 1
          fi

      # Easypanel build Docker costuma demorar
      - name: Aguardar build/redeploy Easypanel
        run: sleep 90

      - name: SSH — heal isolado (sem tocar backends WABA)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || '72.60.51.127' }}
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            REPO="https://raw.githubusercontent.com/walkup-tec/waba/master/scripts"

            curl -fsSL "${REPO}/heal-sinal-verde-pos-redeploy-vps.sh" \
              -o /tmp/heal-sinal-verde-pos-redeploy-vps.sh
            sed -i 's/\r$//' /tmp/heal-sinal-verde-pos-redeploy-vps.sh
            chmod +x /tmp/heal-sinal-verde-pos-redeploy-vps.sh

            # Instala timer + watch docker + path unit (main.yaml → strip SV imediato)
            /tmp/heal-sinal-verde-pos-redeploy-vps.sh install

            ok=0
            for i in 1 2 3 4 5 6; do
              echo "=== passagem post-deploy ${i}/6 ==="
              /tmp/heal-sinal-verde-pos-redeploy-vps.sh post-deploy || true

              # Guarda: WABA NÃO pode cair por causa deste heal
              waba="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 12 \
                https://wabadisparos.com.br/ || echo 000)"
              echo "wabadisparos=${waba}"
              case "$waba" in
                200|301|302|303|307|308) ;;
                *)
                  echo "::error::WABA caiu durante heal SV — abort (isolação falhou)"
                  /tmp/heal-sinal-verde-pos-redeploy-vps.sh status || true
                  exit 1
                  ;;
              esac

              code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 \
                --resolve acesso-sinalverde.com:443:127.0.0.1 \
                https://acesso-sinalverde.com/ || echo 000)"
              echo "https_sv=${code}"
              case "$code" in
                200|301|302|303|307|308) ok=1; break ;;
              esac
              sleep 25
            done

            /tmp/heal-sinal-verde-pos-redeploy-vps.sh status || true
            test "$ok" = "1"
